name: sojorn
description: "Sojorn - Friend's Only. A product of MPLS LLC."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend Services (Fully migrated to Go API)
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1

  # State Management
  flutter_riverpod: ^3.2.1

  # HTTP & API
  http: ^1.2.2
  connectivity_plus: ^6.1.2

  # UI & Utilities
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  share_plus: ^10.1.4
  timeago: ^3.7.0
  url_launcher: ^6.3.2
  image_picker: ^1.1.2
  image: ^4.3.0
  flutter_image_compress: ^2.4.0
  video_player: ^2.10.1
  visibility_detector: ^0.4.0+2
  ffmpeg_kit_flutter_new: ^4.1.0
  flutter_animate: ^4.5.0

  # Graphics & Images
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.10

  # Rich Text Editor
  flutter_quill: ^11.0.0
  flutter_quill_extensions: ^11.0.0
  flutter_colorpicker: ^1.1.0
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.3.0

  # Image Editing
  pro_image_editor: ^11.22.1
  pro_video_editor: ^1.3.0
  camera: ^0.11.3

  # Navigation
  go_router: ^17.1.0

  # Storage
  shared_preferences: ^2.3.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # E2EE Cryptography
  cryptography: ^2.5.0
  cryptography_flutter: ^2.3.4
  convert: ^3.1.1
  file_picker: ^10.3.10
  universal_html: ^2.0.8

  # Maps and Location
  flutter_map: ^8.2.0
  flutter_map_marker_cluster: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.0
  http_parser: ^4.1.2
  app_links: ^7.0.0

  path_provider: ^2.1.5
  video_editor: ^3.0.0
  chewie: ^1.10.0
  intl: 0.19.0
  web_socket_channel: ^3.0.3
  device_info_plus: ^12.3.0
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/applogo.png
    - assets/images/toplogo.png
    - assets/reactions/
    - assets/reactions/dotto/
    - assets/icon/
    - assets/rive/
    - assets/audio/

dependency_overrides:
  intl: 0.19.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
